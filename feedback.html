<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 500px;">
        <h2 class="text-center mb-4">Feedback Form</h2>

        <form>
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label for="rating" class="form-label">Rating</label>
                <select id="rating" class="form-select" required>
                    <option selected disabled>Select Rating</option>
                    <option>Excellent ⭐⭐⭐⭐⭐</option>
                    <option>Good ⭐⭐⭐⭐</option>
                    <option>Average ⭐⭐⭐</option>
                    <option>Poor ⭐⭐</option>
                    <option>Very Poor ⭐</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="comments" class="form-label">Comments</label>
                <textarea id="comments" class="form-control" rows="4"
                    placeholder="Write your feedback here..." required></textarea>
            </div>

            <button
                type="button"
                class="btn btn-success w-100"
                data-bs-toggle="modal"
                data-bs-target="#feedbackModal">
                Submit Feedback
            </button>
        </form>
    </div>
</div>


<div class="modal fade" id="feedbackModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Thank You!</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Your feedback has been submitted successfully.
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                    OK
                </button>
            </div>

        </div>
    </div>
</div>

<div class="modal-footer">
   <a href="./Main.html" ><button type="button" class="btn btn-primary" data-bs-dismiss="modal">
                    Back
                </button></a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
